<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>emilymazzie.com</title>
  <link rel="stylesheet" href="landing.css">
</head>
<body>
  <div class="gif-container">
    <img src="kingtritonwhip.gif" alt="gif">
  </div>

  <h1>emilymazzie.com</h1>
  <h2>Contact Us</h2>

  <form id="contact-form">
    <input type="hidden" name="_subject" value="New message from my site">

    <label>Name:</label>
    <input type="text" name="name" required><br><br>

    <label>Email:</label>
    <input type="email" name="email" required><br><br>

    <label>Message:</label>
    <textarea name="message" required></textarea><br><br>

    <button type="submit">Send</button>
  </form>

  <script>
    const form = document.getElementById("contact-form");

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      const data = new FormData(form);

      const response = await fetch("https://formspree.io/f/mwvakyyj", {
        method: "POST",
        body: data,
        headers: {
          "Accept": "application/json"
        }
      });

      if (response.ok) {
        window.location.href = "thanks.html";
      } else {
        alert("There was a problem submitting the form.");
      }
    });
  </script>
</body>
</html>
